<!DOCTYPE html>
<html lang="en" xmlns:th="http://wwww.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text=${titulo}>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/Estilo_Base.css}">
    <link rel="stylesheet" th:href="@{/css/Estilo_Directors.css}">
</head>

<body id="Aux">

    <div th:replace="Directors/Index_Director :: nav" class="container" id="Auxi1"></div>

    <div class="row text-center" id="Auxi6">
        <h1 th:text=${titulo}></h1>
    </div>

    <div id="Auxi7">
        <a class="btn" id="Auxi8" th:href="@{/Form_Plantel}">Crear Usuario</a>
    </div>
    <div id="Auxi17">
      <a class="btn" id="Auxi8" th:href="@{/List_Role}">Crear Rol</a>
    </div>
    <div id="Auxi18">
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" aria-label="Search">
        <button class="btn" type="submit">Buscar</button>
      </form>
    </div>

    <div class="contrainer" id="Auxi9">
        <table class="table">
            <thead>
              <tr>
                <th scope="col"></th>
                <th scope="col">Documento</th>
                <th scope="col">Nombre</th>
                <th scope="col">Dirección</th>
                <th scope="col">Telefóno</th>
                <th scope="col">Email</th>
                <th scope="col">Rol</th>
                <th scope="col">Editar</th>
                <th scope="col">Eliminar</th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
                <tr th:each="Plantel: ${plantel}">
                <th></th>
                <th th:text="${Plantel.Document}"></th>
                <th th:text="${Plantel.Name}"></th>
                <th th:text="${Plantel.Adress}"></th>
                <th th:text="${Plantel.Telephone}"></th>
                <th th:text="${Plantel.Email}"></th>
                <th th:each="rol: ${Plantel.roles}" th:text="${rol.Name_Role}"></th>
                <th><a class="btn btn-xs" th:href="@{/Form_Plantel/} + ${Plantel.Id_People}" style="border: 1px solid;">Editar</a></th>
                <th><a class="btn btn-xs" th:href="@{/Eliminar/} + ${Plantel.Id_People}" style="border: 1px solid;" onclick="return confirm('¿Está seguro que quiere eliminar?')">Eliminar</a></th>               
              </tr>
            </tbody>
          </table>
    </div>
    
    <footer th:replace="Plantilla/Base :: footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script src="js/bootstrap.bundle.min.js" type=""></script>

</body>

</html>
