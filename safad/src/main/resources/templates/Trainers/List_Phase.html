<!DOCTYPE html>
<html lang="en" xmlns:th="http://wwww.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/Estilo_Base.css}">
    <link rel="stylesheet" th:href="@{/css/Estilo_Directors.css}">
</head>

<body id="Aux">

    <div th:replace="Trainers/Index_Trainer :: nav" class="container" id="Auxi1"></div>

    <div class="row text-center" id="Auxi6">
        <h1 th:text=${titulo}></h1>
    </div>

    <div id="Auxi7">
        <a class="btn" id="Auxi8" th:href="@{/Form_Phase}">Crear</a>
    </div>

    <div class="contrainer" id="Auxi9">
        <table class="table">
            <thead>
              <tr>
                <th scope="col">Id</th>
                <th scope="col">Descripción</th>
                <th scope="col">Indicador de logro</th>
                <th scope="col">Fecha de Inicio</th>
                <th scope="col">Fecha Final</th>
                <th scope="col">Editar</th>
                <th scope="col">Eliminar </th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
                <tr th:each="Phase: ${phase}">
                <th th:text="${Phase.Id_Phase}"></th>
                <th th:text="${Phase.Description}"></th>
                <th th:text="${Phase.Achievement_Indicador}"></th>
                <th th:text="${Phase.Start_Date}"></th>
                <th th:text="${Phase.End_Date}"></th>
                <th><a class="btn btn-xs" th:href="@{/Form_Phase/} + ${Phase.Id_Phase}">Editar</a></th>
                <th><a class="btn btn-xs" th:href="@{/eliminar/} + ${Phase.Id_Phase}" onclick="return confirm('¿Está seguro que quiere eliminar?')">Eliminar</a></th>               
              </tr>
            </tbody>
          </table>
    </div>
    
    <footer th:replace="Plantilla/Base :: footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script src="js/bootstrap.bundle.min.js" type=""></script>

</body>

</html>
